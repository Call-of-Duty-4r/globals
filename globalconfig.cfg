//CoD4X Global Config — COD4R fork
// IMPORTANT: keep the literal string "CoD4X Global Config" above —
// both dedi and client require it as a sanity marker (strstr check)
// before applying the fetched body. Don't change the marker text.
//
// Master is hosted at 150.136.127.81 (Oracle Cloud, Ashburn).
// The "*" prefix marks it as authoritative (can issue restart commands).
// Port 20810 is the default PORT_MASTER — no need to specify.

set sv_masterservers "*150.136.127.81"

// Server-browser filter list. The master returns 200 with an empty body
// until filter.txt is populated; that's a no-op for the client.
set cl_filterlisturl "http://150.136.127.81:8080/v1/filter"

// UI branding string (cosmetic, shown in some menus).
set cl_cod4xsitedom "cod4r.local"

// Dedi auto-updater base URL. The dedi GETs
// <this>?mode=11&os=<os>&ver=<ver> at startup; master replies HTTP 204
// ("up to date") so the dedi skips auto-update.
set sv_updateservers "http://150.136.127.81:8080/v1/updates/check"

// Dead cvar — not read by any client code, kept only so old globalconfigs
// don't generate "unknown cvar" noise.
set cl_updateservers ""
