//CoD4X Global Config — COD4R fork
// IMPORTANT: keep the literal string "CoD4X Global Config" above —
// both dedi and client require it as a sanity marker (strstr check)
// before applying the fetched body. Don't change the marker text.
//
// Replace COD4R-MASTER-HOST below with your master server's public
// hostname or IP once you have it deployed (any reachable name works:
// master.cod4r.example, 1.2.3.4, etc).
// Port suffix is optional — 20810 is the default PORT_MASTER.

set sv_masterservers "*COD4R-MASTER-HOST"

// Filter list: leave empty to show all servers in the browser. Set to
// http://COD4R-MASTER-HOST:8080/v1/filter once you have entries to
// publish (the master returns an empty body until you add any).
set cl_filterlisturl ""

// UI branding string (cosmetic, shown in some menus).
set cl_cod4xsitedom "cod4r.local"

// Dedi auto-updater base URL. With the master endpoint below, the
// dedi GETs `<this>?mode=11&os=<os>&ver=<ver>` and gets HTTP 204
// ("up to date") until you start shipping real updates.
set sv_updateservers "http://COD4R-MASTER-HOST:8080/v1/updates/check"

// Dead cvar — not read by any client code, kept only so old globalconfigs
// don't generate "unknown cvar" noise.
set cl_updateservers ""
